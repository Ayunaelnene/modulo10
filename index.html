<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validar Cédula-Módulo 10</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(to bottom, #f0f4f8, #d9e2ec);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
  
      display: flex;
      flex-direction: column;      
      justify-content: space-between;  
      align-items: center;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      padding: 2rem;
      max-width: 500px;
      width: 100%;
    }

    h1 {
      text-align: center;
      color: #003087; 
      margin-bottom: 1.5rem;
    }

    .cedula-card {
      background: linear-gradient(135deg, #e9db5a 0%, #70660e 100%);
      color: white;
      border-radius: 10px;
      padding: 2.8rem;
      margin: 1.5rem 0;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }

    .cedula-card::before {
      content: "REPÚBLICA DOMINICANA";
      position: absolute;
      top: 15px;
      left: 20px;
      font-size: 0.9rem;
      font-weight: bold;
      opacity: 0.9;
    }

    .cedula-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .escudo {
      width: 90px;          
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
    }   

    .escudo img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;  
      filter: brightness(1.1) contrast(1.05);  
    }   

    .numero {
      font-size: 1.6rem;
      font-weight: bold;
      letter-spacing: 2px;
      background: rgba(255,255,255,0.15);
      padding: 6px 12px;
      border-radius: 6px;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #333;
    }

    input {
      width: 100%;
      padding: 14px;
      font-size: 1.3rem;
      border: 2px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      transition: border 0.3s;
    }

    input:focus {
      border-color: #003087;
      outline: none;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #003087;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #001f5f;
    }

    #resultado {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 8px;
      font-size: 1.3rem;
      font-weight: bold;
      text-align: center;
    }

    .correcta { background: #d4edda; color: #155724; }
    .incorrecta { background: #f8d7da; color: #721c24; }
    .info { background: #fff3cd; color: #856404; font-size: 1rem; }

    @media (max-width: 500px) {
      .container { padding: 1.5rem; }
      input, button { font-size: 1.1rem; }
    }

    footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #100dd6;
            font-size: 0.9em;
        }
  </style>
</head>
<body>

  <div class="container">
    <h1>Validador de Cédula</h1>
    
    <div class="cedula-card">
      <div class="cedula-header">
        <div class="escudo">
          <img 
            src="Escudo.svg" 
            alt="Escudo de Armas de la República Dominicana"
            loading="lazy">
          </div> 
        <div class="numero" id="numeroMostrado">000-0000000-0</div>
      </div>
      <p style="margin: 0; opacity: 0.9; font-size: 0.95rem;">
        JUNTA CENTRAL ELECTORAL<br>
        CÉDULA DE IDENTIDAD Y ELECTORAL
      </p>
    </div>

    <div class="form-group">
      <label for="cedula">Ingrese la cédula a validar:</label>
      <input 
        type="text" 
        id="cedula" 
        placeholder="Ej: 40221708236 o 402-2170823-6" 
        maxlength="17"
        autocomplete="off"
      >
    </div>

    <button onclick="validar()">Validar Cédula</button>

    <div id="resultado"></div>
  </div>

  <script>
    const input = document.getElementById('cedula');
    const numeroMostrado = document.getElementById('numeroMostrado');
    const resultadoDiv = document.getElementById('resultado');

    input.addEventListener('input', function(e) {
      let valor = this.value.replace(/\D/g, '');
      if (valor.length > 11) valor = valor.slice(0,11);
      
      let formateado = '';
      if (valor.length >= 3) {
        formateado += valor.slice(0,3) + '-';
        if (valor.length >= 10) {
          formateado += valor.slice(3,10) + '-' + valor.slice(10);
        } else {
          formateado += valor.slice(3);
        }
      } else {
        formateado = valor;
      }
      
      this.value = formateado;
      numeroMostrado.textContent = formateado || '000-0000000-0';
    });

    function validar() {
      let cedula = input.value.replace(/[\s\-]/g, '').trim();

      resultadoDiv.className = '';
      resultadoDiv.innerHTML = '';

      if (!cedula) {
        mostrarMensaje('Por favor ingrese un número de cédula', 'info');
        return;
      }

      const res = validarCedula(cedula);

      if (res.esValida) {
        resultadoDiv.className = 'correcta';
        resultadoDiv.innerHTML = '✅ CÉDULA VÁLIDA<br><small>(dígito verificador correcto)</small>';
      } else {
        resultadoDiv.className = 'incorrecta';
        if (res.tipoError === 'longitud') {
          resultadoDiv.innerHTML = '❌ Debe tener exactamente 11 dígitos';
        } else if (res.tipoError === 'digitos') {
          resultadoDiv.innerHTML = '❌ Solo números permitidos';
        } else if (res.tipoError === 'patron') {
          resultadoDiv.innerHTML = '❌ Número inválido (secuencia no permitida)';
        } else {
          resultadoDiv.innerHTML = '❌ CÉDULA INCORRECTA<br><small>dígito verificador no coincide</small>';
        }
      }
    }

    function validarCedula(cedula) {
      cedula = cedula.replace(/\D/g, '');

      if (cedula.length !== 11) {
        return { esValida: false, tipoError: 'longitud' };
      }

      if (!/^\d{11}$/.test(cedula)) {
        return { esValida: false, tipoError: 'digitos' };
      }

      if (cedula === '00000000000') {
        return { esValida: false, tipoError: 'patron' };
      }

      if (/^(\d)\1{10}$/.test(cedula)) {
        return { esValida: false, tipoError: 'patron' };
      }

      const digitos = cedula.split('').map(Number);
      const verificador = digitos[10];
      let suma = 0;

      for (let i = 0; i < 10; i++) {
        let mult = (i % 2 === 0) ? 1 : 2;
        let prod = digitos[i] * mult;
        suma += (prod >= 10) ? prod - 9 : prod;
      }

      const esperado = (10 - (suma % 10)) % 10;
      const esValida = esperado === verificador;

      return { esValida };
    }

    function mostrarMensaje(texto, clase) {
      resultadoDiv.className = clase;
      resultadoDiv.innerHTML = texto;
    }
  </script>
  <footer>
        <p>© 2026 - Nelson Arjuna Mendoza 100643232 • Semestre 2026-10</p>
    </footer>
</body>
</html>
